services:
  app:
    build: .
    container_name: ai-provider
    restart: unless-stopped
    ports:
      - '${APP_PORT:-3000}:3000'
    env_file:
      - .env
    depends_on:
      mariadb:
        condition: service_healthy

  mariadb:
    image: mariadb:latest
    container_name: mariadb
    restart: unless-stopped
    ports:
      - '${DATABASE_PORT:-27006}:3306'
    environment:
      MYSQL_ROOT_PASSWORD: ${DATABASE_PASSWORD:-QazWsx123}
      MYSQL_DATABASE: ${DATABASE_NAME:-ai_provider}
    volumes:
      - ./data/mariadb:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
